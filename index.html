<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stark eBooks</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:15px;
  font-size:22px;
  background:#020617;
}

/* PRODUCTS */
.products {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  border-radius:8px;
}

/* FULL VIEW (HIDDEN) */
.fullview {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#020617;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.fullview img {
  width:80%;
  max-width:300px;
  border-radius:10px;
}

.close {
  position:absolute;
  top:20px;
  right:20px;
  font-size:25px;
  cursor:pointer;
}

.btn {
  padding:12px;
  background:#00c853;
  border:none;
  color:white;
  border-radius:6px;
  margin-top:20px;
}
</style>
</head>

<body>

<header>📚 Stark eBook Store</header>

<section class="products">

<div class="card" onclick="openProduct('ebook.jpg','Money Making Blueprint','₹99','Learn how to earn money online step by step.')">
  <img src="ebook.jpg">
  <h3>Money Making Blueprint</h3>
</div>

<div class="card" onclick="openProduct('ebook.jpg','Instagram Growth','₹149','Grow your Instagram fast.')">
  <img src="ebook.jpg">
  <h3>Instagram Growth</h3>
</div>

</section>

<!-- FULL VIEW -->
<div class="fullview" id="fullview">
  <div class="close" onclick="closeProduct()">✖</div>

  <img id="pimg">
  <h2 id="ptitle"></h2>
  <p id="pdesc"></p>
  <h3 id="pprice"></h3>

  <button class="btn">Buy Now</button>
</div>

<script>
function openProduct(img,title,price,desc){
  document.getElementById("fullview").style.display="flex";
  document.getElementById("pimg").src=img;
  document.getElementById("ptitle").innerText=title;
  document.getElementById("pprice").innerText=price;
  document.getElementById("pdesc").innerText=desc;
}

function closeProduct(){
  document.getElementById("fullview").style.display="none";
}
</script>

</body>
</html>
