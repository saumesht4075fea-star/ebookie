<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stark Premium eBooks</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  position: sticky;
  top: 0;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.5);
}

header h2 { color: #38bdf8; }

/* HERO */
.hero {
  text-align: center;
  padding: 100px 20px;
}

.hero h1 {
  font-size: 42px;
}

.hero p {
  color: #94a3b8;
}

/* TIMER */
.timer {
  font-size: 22px;
  margin: 15px 0;
  color: #f87171;
}

/* BUTTON */
.btn {
  padding: 14px 28px;
  border: none;
  background: #38bdf8;
  color: black;
  border-radius: 6px;
  cursor: pointer;
  font-size: 16px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
  padding: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  padding: 15px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.price {
  color: #22c55e;
  font-size: 20px;
}

.card button {
  width: 100%;
  margin-top: 10px;
}

/* TRUST */
.trust {
  text-align: center;
  padding: 40px;
}

/* STICKY BUY */
.sticky {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #38bdf8;
  color: black;
  text-align: center;
  padding: 10px;
  font-weight: bold;
  cursor: pointer;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h2>🚀 Stark eBooks</h2>
</header>

<section class="hero">
  <h1>Earn ₹5000+ Monthly with These eBooks 💰</h1>
  <p>Limited Time Offer • Instant Download</p>

  <div class="timer" id="countdown">Loading timer...</div>

  <button class="btn" onclick="scrollToStore()">Buy Now</button>
</section>

<section class="trust">
  <h2>⭐ 2,500+ Happy Buyers</h2>
  <p>Real People. Real Results.</p>
</section>

<section class="products" id="store">

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Money Making Blueprint</h3>
    <p class="price">₹99</p>
    <button class="btn" onclick="buy()">Buy Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Instagram Growth Secrets</h3>
    <p class="price">₹149</p>
    <button class="btn" onclick="buy()">Buy Now</button>
  </div>

</section>

<div class="sticky" onclick="buy()">
🔥 Buy Now – Limited Offer ₹99
</div>

<footer>
  <p>© 2026 Stark eBooks</p>
</footer>

<script>
// SCROLL
function scrollToStore() {
  document.getElementById("store").scrollIntoView({ behavior: "smooth" });
}

// BUY BUTTON
function buy() {
  window.location.href = "YOUR_LINK_HERE";
}

// COUNTDOWN TIMER (10 minutes)
let time = 600;
let timer = setInterval(() => {
  let minutes = Math.floor(time / 60);
  let seconds = time % 60;
  document.getElementById("countdown").innerText =
    "⏳ Offer ends in: " + minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
  time--;
  if (time < 0) clearInterval(timer);
}, 1000);
</script>

</body>
</html>
